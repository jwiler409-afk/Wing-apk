<!DOCTYPE html>
<html lang="ht">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Wing APK Downloader</title>
<style>
  :root{
    --blue-dark:#0d2b52;
    --blue:#1a4d8f;
    --blue-mid:#2565b8;
    --blue-light:#eaf1fb;
    --gold:#f5a623;
    --red:#c8102e;
    --gray:#5b6b7c;
    --card-bg:#ffffff;
    --bg:#f4f7fb;
  }
  *{box-sizing:border-box;margin:0;padding:0;font-family:'Segoe UI',Roboto,Arial,sans-serif;}
  body{background:var(--bg);color:var(--blue-dark);padding-bottom:70px;}
  .app{max-width:480px;margin:0 auto;background:var(--bg);min-height:100vh;position:relative;}

  header{background:linear-gradient(135deg,#0d2b52,#1a4d8f);padding:14px 16px 10px;color:#fff;}
  .header-top{display:flex;align-items:center;justify-content:space-between;}
  .brand{display:flex;align-items:center;gap:8px;cursor:pointer;user-select:none;-webkit-user-select:none;}
  .brand svg{width:34px;height:34px;flex-shrink:0;}
  .brand-text{line-height:1.05;}
  .brand-text .name{font-size:19px;font-weight:800;letter-spacing:.3px;}
  .brand-text .sub{font-size:9px;opacity:.85;font-weight:500;}
  .brand-text .made{font-size:8px;opacity:.65;}
  .header-icons{display:flex;align-items:center;gap:10px;}
  .icon-btn{position:relative;width:30px;height:30px;border-radius:50%;background:rgba(255,255,255,.12);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px;}
  .lang-btn{background:rgba(255,255,255,.15);border:none;color:#fff;font-size:11px;font-weight:800;border-radius:14px;padding:6px 10px;cursor:pointer;letter-spacing:.5px;}
  .fb-status{display:flex;align-items:center;gap:5px;font-size:9px;font-weight:700;color:#fff;opacity:.9;}
  .fb-dot{width:8px;height:8px;border-radius:50%;background:#9aa9bb;flex-shrink:0;transition:background .2s;}
  .fb-dot.online{background:#2ecc71;box-shadow:0 0 4px #2ecc71;}
  .fb-dot.offline{background:#e74c3c;box-shadow:0 0 4px #e74c3c;}
  .fb-dot.checking{background:#f5a623;}
  .admin-fb-status{display:flex;align-items:center;gap:6px;font-size:11px;font-weight:700;color:#fff;background:rgba(255,255,255,.12);padding:5px 10px;border-radius:12px;margin-left:8px;flex-shrink:0;}
  .badge-dot{position:absolute;top:-2px;right:-2px;background:var(--red);color:#fff;font-size:9px;border-radius:8px;padding:1px 4px;font-weight:700;}
  .search-row{margin-top:12px;background:#fff;border-radius:20px;display:flex;align-items:center;padding:8px 14px;gap:8px;}
  .search-row input{border:none;outline:none;flex:1;font-size:13px;color:var(--blue-dark);}
  .search-row input::placeholder{color:#9aa9bb;}

  .promo-banner{margin:14px 16px 0;background:linear-gradient(120deg,var(--blue-mid),var(--blue-dark));color:#fff;text-align:center;padding:14px;border-radius:12px;font-weight:700;font-size:14px;letter-spacing:.3px;box-shadow:0 4px 10px rgba(13,43,82,.25);}

  .quick-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin:14px 16px 0;}
  .quick-item{background:var(--blue-dark);color:#fff;border-radius:10px;padding:10px 4px;text-align:center;font-size:11px;font-weight:600;cursor:pointer;transition:.15s;}
  .quick-item:active{transform:scale(.95);}
  .quick-item .qi-icon{font-size:18px;margin-bottom:4px;}
  .quick-item .qi-note{display:block;font-size:8px;font-weight:400;opacity:.75;margin-top:2px;}

  .section-title{margin:20px 16px 10px;font-size:16px;font-weight:800;color:var(--blue-dark);}

  .apk-scroll{display:flex;gap:12px;overflow-x:auto;padding:0 16px 6px;scrollbar-width:none;}
  .apk-scroll::-webkit-scrollbar{display:none;}
  .apk-card{background:var(--card-bg);border-radius:12px;min-width:140px;max-width:140px;box-shadow:0 2px 8px rgba(13,43,82,.08);overflow:hidden;flex-shrink:0;cursor:pointer;}
  .apk-icon{height:90px;background:linear-gradient(135deg,#cdd9ea,#a9bcd6);display:flex;align-items:center;justify-content:center;font-size:34px;color:#5b6b7c;}
  .apk-icon img{width:100%;height:100%;object-fit:cover;}
  .apk-info{padding:8px;}
  .apk-name{font-size:12.5px;font-weight:700;color:var(--blue-dark);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .apk-meta{display:flex;justify-content:space-between;align-items:center;margin-top:5px;}
  .apk-rating{font-size:10.5px;color:#e0a300;font-weight:600;}
  .apk-price{font-size:9.5px;font-weight:700;padding:2px 6px;border-radius:6px;color:#fff;}
  .price-free{background:#1f8a4c;}
  .price-paid{background:var(--blue-dark);}

  .cat-grid{display:flex;gap:8px;flex-wrap:wrap;margin:0 16px;}
  .cat-chip{background:var(--blue);color:#fff;font-size:12px;font-weight:600;padding:8px 16px;border-radius:8px;cursor:pointer;opacity:.9;}
  .cat-chip.active{background:var(--gold);color:var(--blue-dark);opacity:1;}

  .announce{margin:18px 16px 0;background:linear-gradient(120deg,var(--blue-mid),var(--blue-dark));border-radius:10px;overflow:hidden;color:#fff;}
  .announce-head{padding:10px 14px;font-weight:800;font-size:14px;background:rgba(255,255,255,.08);}
  .announce-body{padding:12px 14px;font-size:12.5px;line-height:1.4;}

  .bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:#fff;display:flex;justify-content:space-around;padding:8px 0 10px;box-shadow:0 -2px 10px rgba(13,43,82,.1);z-index:40;}
  .nav-item{text-align:center;font-size:10px;color:var(--gray);cursor:pointer;font-weight:600;}
  .nav-item.active{color:var(--blue-dark);}
  .nav-item .ni-icon{font-size:19px;display:block;margin-bottom:2px;}

  .overlay{position:fixed;inset:0;background:rgba(13,43,82,.55);display:none;align-items:center;justify-content:center;z-index:100;padding:20px;}
  .overlay.show{display:flex;}
  .modal{background:#fff;border-radius:14px;width:100%;max-width:380px;max-height:88vh;overflow-y:auto;padding:20px;position:relative;}
  .modal h3{color:var(--blue-dark);font-size:17px;margin-bottom:12px;display:flex;align-items:center;gap:8px;}
  .modal label{display:block;font-size:12px;font-weight:600;color:var(--gray);margin:10px 0 4px;}
  .modal input,.modal select,.modal textarea{width:100%;padding:9px 10px;border:1px solid #d5dee9;border-radius:8px;font-size:13px;outline:none;}
  .modal textarea{resize:vertical;min-height:60px;}
  .btn{display:block;width:100%;text-align:center;padding:11px;border-radius:8px;font-weight:700;font-size:14px;border:none;cursor:pointer;margin-top:14px;}
  .btn-primary{background:var(--blue-dark);color:#fff;}
  .btn-secondary{background:#e7edf5;color:var(--blue-dark);}
  .btn-danger{background:#c8102e;color:#fff;}
  .close-x{position:absolute;top:14px;right:16px;font-size:20px;color:var(--gray);cursor:pointer;background:none;border:none;}

  .admin-menu-item{background:var(--blue-light);padding:12px 14px;border-radius:10px;margin-bottom:10px;font-weight:700;color:var(--blue-dark);display:flex;align-items:center;gap:10px;cursor:pointer;font-size:14px;}
  .admin-menu-item span.chev{margin-left:auto;opacity:.5;}
  .apk-admin-row{display:flex;align-items:center;gap:10px;background:#f5f8fc;border-radius:8px;padding:8px;margin-bottom:8px;}
  .apk-admin-row .thumb{width:38px;height:38px;border-radius:6px;background:#cdd9ea;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;overflow:hidden;}
  .apk-admin-row .thumb img{width:100%;height:100%;object-fit:cover;}
  .apk-admin-row .meta{flex:1;min-width:0;}
  .apk-admin-row .meta .n{font-size:12.5px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .apk-admin-row .meta .d{font-size:10.5px;color:var(--gray);}
  .mini-btn{font-size:11px;padding:5px 8px;border-radius:6px;border:none;cursor:pointer;font-weight:700;}

  .toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--blue-dark);color:#fff;padding:10px 18px;border-radius:20px;font-size:13px;z-index:200;opacity:0;transition:opacity .25s;pointer-events:none;max-width:90%;text-align:center;}
  .toast.show{opacity:1;}

  .hold-progress{position:fixed;top:0;left:0;height:3px;background:var(--gold);width:0%;z-index:300;transition:width .05s linear;}

  .pay-opt{display:flex;align-items:center;gap:10px;padding:10px;border:1px solid #d5dee9;border-radius:8px;margin-bottom:8px;cursor:pointer;font-weight:600;font-size:13px;}
  .pay-opt.selected{border-color:var(--blue-dark);background:var(--blue-light);}
  .pay-dot{width:16px;height:16px;border-radius:50%;background:#fff;color:#fff;font-size:9px;display:flex;align-items:center;justify-content:center;font-weight:800;flex-shrink:0;}
  .mc{background:#c8102e;} .nc{background:#1f8a4c;} .pp{background:#003087;}

  .empty-note{font-size:12px;color:var(--gray);text-align:center;padding:20px 0;}
  .small-note{font-size:10.5px;color:var(--gray);margin-top:6px;line-height:1.4;}

  .admin-fullscreen{position:fixed;inset:0;background:var(--bg);z-index:150;display:none;overflow-y:auto;}
  .admin-fullscreen.show{display:block;}
  .admin-topbar{position:sticky;top:0;background:linear-gradient(135deg,#0d2b52,#1a4d8f);color:#fff;padding:14px 16px;display:flex;align-items:center;gap:10px;z-index:5;}
  .admin-topbar .back-btn{background:rgba(255,255,255,.15);border:none;color:#fff;width:30px;height:30px;border-radius:50%;font-size:15px;cursor:pointer;flex-shrink:0;}
  .admin-topbar .admin-title{flex:1;font-weight:800;font-size:15px;}
  .admin-topbar .admin-close{background:rgba(255,255,255,.15);border:none;color:#fff;width:30px;height:30px;border-radius:50%;font-size:15px;cursor:pointer;flex-shrink:0;}
  .admin-content{padding:16px;max-width:480px;margin:0 auto;}
  #apkEditOverlay{z-index:170;}

  .dl-row{display:flex;align-items:center;gap:10px;background:#f5f8fc;border-radius:8px;padding:10px;margin-bottom:8px;}
  .dl-row .thumb{width:40px;height:40px;border-radius:8px;background:#cdd9ea;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;overflow:hidden;}
  .dl-row .thumb img{width:100%;height:100%;object-fit:cover;}
  .dl-row .meta{flex:1;min-width:0;}
  .dl-row .meta .n{font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .dl-row .meta .d{font-size:10.5px;color:var(--gray);}

  .avatar-circle{width:78px;height:78px;border-radius:50%;background:linear-gradient(135deg,#cdd9ea,#a9bcd6);display:flex;align-items:center;justify-content:center;font-size:30px;color:#fff;margin:0 auto 10px;overflow:hidden;font-weight:800;}
  .avatar-circle img{width:100%;height:100%;object-fit:cover;}
  .avatar-mini{width:100%;height:100%;object-fit:cover;border-radius:50%;}
  .toggle-link{text-align:center;font-size:12px;color:var(--blue);font-weight:700;margin-top:12px;cursor:pointer;text-decoration:underline;}
  .profile-name{text-align:center;font-size:16px;font-weight:800;color:var(--blue-dark);margin-bottom:2px;}
  .profile-sub{text-align:center;font-size:11px;color:var(--gray);margin-bottom:14px;}
</style>
</head>
<body>
<div class="hold-progress" id="holdProgress"></div>
<div class="app">

  <header>
    <div class="header-top">
      <div class="brand" id="logoHold">
        <svg viewBox="0 0 100 100"><defs><linearGradient id="wg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#4fc3f7"/><stop offset="1" stop-color="#0d2b52"/></linearGradient></defs>
          <path d="M18 78 L36 22 L50 55 L64 22 L82 78 L66 78 L58 55 L50 78 L42 55 L34 78 Z" fill="url(#wg)"/>
        </svg>
        <div class="brand-text">
          <div class="name">Wing <span style="font-weight:400;font-size:12px;" data-i18n="brandSub"></span></div>
          <div class="made">Created by WILER_TECH HT</div>
        </div>
      </div>
      <div class="header-icons">
        <div class="fb-status" id="fbStatusHeader" title="Estati Firebase"><span class="fb-dot checking" id="fbDotHeader"></span><span id="fbTextHeader">...</span></div>
        <button class="lang-btn" id="langBtn" onclick="toggleLang()">FR</button>
        <div class="icon-btn" onclick="openMyDownloads()" title="Telechajman Mwen">📥</div>
        <div class="icon-btn" onclick="openNotif()">🔔<span class="badge-dot" id="notifBadge">1</span></div>
        <div class="icon-btn" id="headerProfileIcon" onclick="openProfile()">👤</div>
      </div>
    </div>
    <div class="search-row">
      <span>🔍</span>
      <input id="searchInput" data-i18n-ph="searchPh" oninput="renderApkList()">
    </div>
  </header>

  <div class="promo-banner" id="promoBanner"></div>

  <div class="quick-grid">
    <div class="quick-item" onclick="setFilter('free')">⬇️<div data-i18n="qFree"></div></div>
    <div class="quick-item" onclick="setFilter('paid')">🛒<div data-i18n="qPaid"></div></div>
    <div class="quick-item" onclick="setFilter('all');toast(t('qUpdateToast'))">🔄<div data-i18n="qUpdate"><span class="qi-note" data-i18n="qUpdateNote"></span></div></div>
    <div class="quick-item" onclick="openPaymentSettings()">💳<div data-i18n="qCard"></div></div>
  </div>

  <div class="section-title" data-i18n="topApk"></div>
  <div class="apk-scroll" id="apkScroll"></div>

  <div class="section-title" data-i18n="popCat"></div>
  <div class="cat-grid" id="catGrid"></div>

  <div class="announce">
    <div class="announce-head" data-i18n="announceHead"></div>
    <div class="announce-body" id="announceBody"></div>
  </div>

  <div class="section-title" data-i18n="allApk"></div>
  <div id="apkGrid" style="display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:0 16px 20px;"></div>

  <div class="bottom-nav">
    <div class="nav-item active"><span class="ni-icon">🏠</span><span data-i18n="navHome"></span></div>
    <div class="nav-item" onclick="document.querySelector('.section-title').scrollIntoView({behavior:'smooth'})"><span class="ni-icon">📂</span><span data-i18n="navCat"></span></div>
    <div class="nav-item" onclick="setFilter('all')"><span class="ni-icon">🔄</span><span data-i18n="navUpdate"></span></div>
    <div class="nav-item" onclick="toast(t('cartEmpty'))"><span class="ni-icon">🛒</span><span data-i18n="navCart"></span></div>
  </div>
</div>

<!-- APK DETAIL / DOWNLOAD MODAL -->
<div class="overlay" id="detailOverlay">
  <div class="modal">
    <button class="close-x" onclick="closeModal('detailOverlay')">✕</button>
    <h3 id="detailName">Non APK</h3>
    <div class="small-note" id="detailMeta"></div>
    <p class="small-note" id="detailDesc" style="margin-top:10px;"></p>
    <button class="btn btn-primary" id="detailActionBtn">Telechaje</button>
    <p class="small-note" data-i18n="unknownSourceNote"></p>
  </div>
</div>

<!-- PAYMENT MODAL -->
<div class="overlay" id="payOverlay">
  <div class="modal">
    <button class="close-x" onclick="closeModal('payOverlay')">✕</button>
    <h3 data-i18n="choosePayment"></h3>
    <div class="pay-opt" data-m="MonCash" onclick="selectPay(this)"><span class="pay-dot mc">M</span> MonCash</div>
    <div class="pay-opt" data-m="NatCash" onclick="selectPay(this)"><span class="pay-dot nc">N</span> NatCash</div>
    <div class="pay-opt" data-m="AyiPay" onclick="selectPay(this)"><span class="pay-dot" style="background:#0d2b52;">A</span> AyiPay</div>
    <div class="pay-opt" data-m="PayPal" onclick="selectPay(this)"><span class="pay-dot pp">P</span> <span data-i18n="paypalIntl"></span></div>
    <div id="payNumberNote" class="small-note" style="background:var(--blue-light);padding:10px;border-radius:8px;display:none;"></div>
    <div id="ayipayLoginBox" style="display:none;margin-top:8px;">
      <label style="font-size:12px;font-weight:700;color:var(--blue-dark);">Imel AyiPay</label>
      <input type="email" id="ayipayEmailInput" placeholder="imel@egzanp.com">
      <label style="font-size:12px;font-weight:700;color:var(--blue-dark);">Mo de pas AyiPay</label>
      <input type="password" id="ayipayPassInput" placeholder="••••••••">
    </div>
    <button class="btn btn-primary" id="confirmPayBtn" onclick="confirmPay()"></button>
  </div>
</div>

<!-- NOTIFICATIONS MODAL -->
<div class="overlay" id="notifOverlay">
  <div class="modal">
    <button class="close-x" onclick="closeModal('notifOverlay')">✕</button>
    <h3 id="notifTitle"></h3>
    <div id="notifList"></div>
  </div>
</div>

<!-- PROFILE MODAL -->
<div class="overlay" id="profileOverlay">
  <div class="modal">
    <button class="close-x" onclick="closeModal('profileOverlay')">✕</button>
    <div id="profileBody"></div>
  </div>
</div>

<!-- MY DOWNLOADS MODAL -->
<div class="overlay" id="myDlOverlay">
  <div class="modal">
    <button class="close-x" onclick="closeModal('myDlOverlay')">✕</button>
    <h3 id="myDlTitle">📥 Telechajman Mwen</h3>
    <div id="myDlList"></div>
  </div>
</div>

<!-- ADMIN LOGIN MODAL -->
<div class="overlay" id="adminLoginOverlay">
  <div class="modal">
    <button class="close-x" onclick="closeModal('adminLoginOverlay')">✕</button>
    <h3 id="adminLoginTitle">🔒 Aksè Admin</h3>
    <label id="adminLoginLabel">Antre Kòd Sekrè:</label>
    <input type="password" id="adminPassInput" placeholder="••••••••">
    <button class="btn btn-primary" onclick="tryAdminLogin()">LOGIN</button>
    <p class="small-note" id="adminLoginNote"></p>
  </div>
</div>

<!-- ADMIN PANEL (FULL SCREEN) -->
<div class="admin-fullscreen" id="adminPanelView">
  <div class="admin-topbar">
    <button class="back-btn" id="adminBackBtn" onclick="adminGoMenu()" style="display:none;">◀</button>
    <div class="admin-title" id="adminTitle">Panel Administrasyon Wing</div>
    <div class="admin-fb-status" id="fbStatusAdmin" title="Estati Firebase"><span class="fb-dot checking" id="fbDotAdmin"></span><span id="fbTextAdmin">...</span></div>
    <button class="admin-close" onclick="closeAdminPanel()">✕</button>
  </div>
  <div class="admin-content" id="adminContent"></div>
</div>

<!-- APK EDIT MODAL -->
<div class="overlay" id="apkEditOverlay">
  <div class="modal">
    <button class="close-x" onclick="closeModal('apkEditOverlay')">✕</button>
    <h3 id="apkEditTitle">➕ Ajoute APK</h3>
    <label id="lbl_name">Non APK</label>
    <input id="f_name" placeholder="Wing Mizik">
    <label id="lbl_cat">Kategori</label>
    <select id="f_cat"><option value="jwet">-</option><option value="edikasyon">-</option><option value="biznis">-</option><option value="mizik">-</option></select>
    <label id="lbl_desc">Deskripsyon</label>
    <textarea id="f_desc"></textarea>
    <label id="lbl_icon">Ikòn APK</label>
    <input type="file" id="f_icon" accept="image/*">
    <label id="lbl_apkfile">Fichye APK (.apk)</label>
    <input type="text" id="f_apk" placeholder="https://github.com/.../releases/download/.../App.apk">
    <p class="small-note" id="apkLinkNote"></p>
    <label id="lbl_size">Taille APK (mt: 3.4 MB)</label>
    <input type="text" id="f_size" placeholder="3.4 MB">
    <label id="lbl_version">Vèsyon (mt: 1.0.0)</label>
    <input type="text" id="f_version" placeholder="1.0.0">
    <label id="lbl_pkg">Non Package Android (pou bouton dezenstale, mt: com.wiler.app)</label>
    <input type="text" id="f_pkg" placeholder="com.wiler.appname">
    <label>Rating (0-5)</label>
    <input id="f_rating" type="number" step="0.1" min="0" max="5" value="4.5">
    <label id="lbl_price">Pri</label>
    <div style="display:flex;gap:8px;">
      <select id="f_pricetype" style="flex:1;" onchange="togglePriceField()"></select>
      <input id="f_price" type="number" placeholder="HTG" style="flex:1;" disabled>
    </div>
    <button class="btn btn-primary" id="saveApkBtn" onclick="saveApk()">Anrejistre</button>
    <input type="hidden" id="f_id">
  </div>
</div>

<div class="toast" id="toastBox"></div>

      // set text for direct text nodes only (first child text)
      for(const node of el.childNodes){ if(node.nodeType===3){ node.textContent = t(key); break; } }

function resizeImageToDataURL(file, maxDim, quality, cb){
  const reader = new FileReader();
  reader.onload = function(e){
    const img = new Image();
    img.onload = function(){
      let w=img.width, h=img.height;
      if(w>h){ if(w>maxDim){ h=Math.round(h*maxDim/w); w=maxDim; } } else { if(h>maxDim){ w=Math.round(w*maxDim/h); h=maxDim; } }
      const canvas=document.createElement('canvas'); canvas.width=w; canvas.height=h;
      canvas.getContext('2d').drawImage(img,0,0,w,h);
      cb(canvas.toDataURL('image/jpeg', quality));
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

/* ================= FIREBASE CONNECTION STATUS ================= */
function setFbStatus(state){
  // state: 'checking' | 'online' | 'offline'
  const labels = {checking:(LANG==='fr'?'Vérification...':'Verifikasyon...'), online:(LANG==='fr'?'Connecté':'Konekte'), offline:(LANG==='fr'?'Déconnecté':'Dekonekte')};
  [['fbDotHeader','fbTextHeader'],['fbDotAdmin','fbTextAdmin']].forEach(([dotId,txtId])=>{
    const dot = document.getElementById(dotId), txt = document.getElementById(txtId);
    if(dot){ dot.classList.remove('checking','online','offline'); dot.classList.add(state); }
    if(txt){ txt.textContent = labels[state]; }
  });
}
window.addEventListener('offline', ()=> setFbStatus('offline'));
window.addEventListener('online', ()=> setFbStatus('checking'));

/* Real-time APK catalog */
db.collection('apks').onSnapshot(async function(snap){
  setFbStatus(snap.metadata.fromCache ? 'offline' : 'online');
  if(snap.empty && !seededApks){
    seededApks = true;
    const batch = db.batch();
    DEFAULT_APKS.forEach(a=>{ const ref=db.collection('apks').doc(); batch.set(ref,a); });
    await batch.commit();
    return;
  }
  apks = snap.docs.map(d=>Object.assign({id:d.id}, d.data()));
  renderAll();
  refreshAdminIfManage();
}, function(err){ setFbStatus('offline'); toast('Firestore (apks): '+err.message); });

/* Real-time settings (promo text, payment numbers, admin secret code) */
db.collection('settings').doc('global').onSnapshot(async function(docSnap){
  setFbStatus(docSnap.metadata.fromCache ? 'offline' : 'online');
  if(!docSnap.exists){ await db.collection('settings').doc('global').set(DEFAULT_SETTINGS); return; }
  const data = docSnap.data();
  settings = Object.assign({}, DEFAULT_SETTINGS, data, {pay:Object.assign({moncash:'',natcash:'',ayipay:'',paypal:''}, data.pay||{})});
  renderAll();
}, function(err){ setFbStatus('offline'); toast('Firestore (settings): '+err.message); });

function loadGuestDownloads(){ const s = localStorage.getItem('wing_my_downloads'); return s ? JSON.parse(s) : []; }
function saveGuestDownloads(list){ localStorage.setItem('wing_my_downloads', JSON.stringify(list)); }
function recordDownload(a, localUri){
  const entry = {id:a.id, name:a.name, icon:a.icon||'', price:a.price, date:new Date().toISOString(), pkg:a.pkg||'', localUri:localUri||''};
  const u = getCurrentUser();
  if(u){
    let list = (u.downloads||[]).slice();
    list.unshift(entry); if(list.length>50) list = list.slice(0,50);
    u.downloads = list;
    db.collection('users').doc(u.uid).update({downloads:list}).catch(function(err){ toast('Firestore: '+err.message); });
  } else {
    let list = loadGuestDownloads();
    list.unshift(entry); if(list.length>50) list = list.slice(0,50);
    saveGuestDownloads(list);
  }
}

function isNativeApp(){
  return !!(window.Capacitor && window.Capacitor.isNativePlatform && window.Capacitor.isNativePlatform());
}
async function doDownloadNative(a){
  try{
    toast(t('dlStart'));
    const fileName = a.name.replace(/\s+/g,'_') + '_' + Date.now() + '.apk';
    const { Filesystem, Directory } = window.Capacitor.Plugins;
    const { FileTransfer } = window.Capacitor.Plugins;
    const { FileOpener } = window.Capacitor.Plugins;
    const fileInfo = await Filesystem.getUri({ directory: Directory.Cache, path: fileName });
    await FileTransfer.downloadFile({ url: a.apkData, path: fileInfo.uri, progress: false });
    recordDownload(a, fileInfo.uri);
    await FileOpener.openFile({ path: fileInfo.uri, mimeType: 'application/vnd.android.package-archive' });
  }catch(err){
    toast((LANG==='fr'?'Erreur de téléchargement: ':'Erè telechajman: ')+(err && err.message ? err.message : err));
  }
}
async function reinstallApk(localUri){
  if(!isNativeApp()){ toast(LANG==='fr'?'Disponible seulement dans l\'app Android':'Sèlman disponib nan app Android lan'); return; }
  if(!localUri){ toast(LANG==='fr'?'Fichier introuvable, retéléchargez':'Fichye a pa jwenn, telechaje ankò'); return; }
  try{
    const { FileOpener } = window.Capacitor.Plugins;
    await FileOpener.openFile({ path: localUri, mimeType: 'application/vnd.android.package-archive' });
  }catch(err){
    toast((LANG==='fr'?'Erreur: ':'Erè: ')+(err && err.message ? err.message : err));
  }
}
function uninstallApk(pkg){
  if(!isNativeApp()){ toast(LANG==='fr'?'Disponible seulement dans l\'app Android':'Sèlman disponib nan app Android lan'); return; }
  if(!pkg){ toast(LANG==='fr'?'Nom de package manquant':'Non package pa mete'); return; }
  window.location.href = `intent:#Intent;action=android.intent.action.DELETE;data=package:${pkg};end`;
}
function doDownload(id){
  const a = apks.find(x=>x.id===id); if(!a) return;
  db.collection('apks').doc(id).update({downloads: (a.downloads||0)+1}).catch(function(err){ toast('Firestore: '+err.message); });
  if(isNativeApp() && a.apkData && !a.apkData.startsWith('data:')){
    /* running inside the packaged Android app: download to device storage and open the system installer directly, without leaving Wing */
    doDownloadNative(a);
  } else if(a.apkData && a.apkData.startsWith('data:')){
    /* legacy: old base64-stored file (from before external links) */
    recordDownload(a);
    const link=document.createElement('a');
    link.href=a.apkData; link.download=(a.name.replace(/\s+/g,'_')+'.apk');
    document.body.appendChild(link); link.click(); link.remove();
    toast(t('dlStart'));
  } else if(a.apkData){
    /* website / no native plugins available: external direct link (GitHub Release, Google Drive, etc.) */
    recordDownload(a);
    const link=document.createElement('a');
    link.href=a.apkData; link.target='_blank'; link.rel='noopener';
    document.body.appendChild(link); link.click(); link.remove();
    toast(t('dlStart'));
  } else {
    toast(t('dlMissing'));
  }
  closeModal('detailOverlay');
}

async function confirmPay(){
  if(!selectedPayMethod){ toast(t('chooseMethod')); return; }
  if(selectedPayMethod === 'AyiPay'){
    await confirmPayWithAyiPay();
    return;
  }
  const u = getCurrentUser();
  if(u && pendingPayId && !(u.purchases||[]).includes(pendingPayId)){
    const newPurchases = (u.purchases||[]).concat([pendingPayId]);
    u.purchases = newPurchases;
    db.collection('users').doc(u.uid).update({purchases:newPurchases}).catch(function(err){ toast('Firestore: '+err.message); });
    toast(`${t('payMethodConfirmed')} ${selectedPayMethod} ${t('payConfirmedSuffix')} ${t('purchaseSavedNote')}`);
  } else if(!u){
    toast(`${t('payMethodConfirmed')} ${selectedPayMethod} ${t('payConfirmedSuffix')} ${t('guestPurchaseNote')}`);
  } else {
    toast(`${t('payMethodConfirmed')} ${selectedPayMethod} ${t('payConfirmedSuffix')}`);
  }
  closeModal('payOverlay');
  if(pendingPayId) doDownload(pendingPayId);
}

async function confirmPayWithAyiPay(){
  const email = document.getElementById('ayipayEmailInput').value.trim();
  const pass = document.getElementById('ayipayPassInput').value;
  const a = apks.find(x=>x.id===pendingPayId);
  if(!a){ toast(t('dlMissing')); return; }
  if(!email || !pass){ toast(LANG==='fr'?'Entrez votre email et mot de passe AyiPay':'Antre imel ak mo de pas AyiPay ou'); return; }
  const btn = document.getElementById('confirmPayBtn');
  const oldTxt = btn.textContent;
  btn.disabled = true; btn.textContent = LANG==='fr'?'Vérification...':'Verifikasyon...';
  try{
    const cred = await ayipayAuth.signInWithEmailAndPassword(email, pass);
    const uid = cred.user.uid;
    const price = a.price || 0;
    const walletRef = ayipayDb.collection('wallets').doc(uid);
    const newBalance = await ayipayDb.runTransaction(async function(tx){
      const snap = await tx.get(walletRef);
      if(!snap.exists) throw new Error('NO_WALLET');
      const bal = snap.data().balans || 0;
      if(bal < price) throw new Error('INSUFFICIENT');
      const nb = bal - price;
      tx.update(walletRef, { balans: nb, updated: Date.now() });
      return nb;
    });
    // Anrejistre acha a pou l parèt nan istorik AyiPay a
    await ayipayDb.collection('wing_purchases').add({
      uid: uid, apkName: a.name, price: price, date: Date.now()
    });
    await ayipayAuth.signOut();
    toast((LANG==='fr'?`Payé avec succès ! Nouveau solde AyiPay: ${newBalance.toLocaleString()} HTG`:`Peye ak siksè! Nouvo balans AyiPay: ${newBalance.toLocaleString()} HTG`));
    const u = getCurrentUser();
    if(u && pendingPayId && !(u.purchases||[]).includes(pendingPayId)){
      const newPurchases = (u.purchases||[]).concat([pendingPayId]);
      u.purchases = newPurchases;
      db.collection('users').doc(u.uid).update({purchases:newPurchases}).catch(function(){});
    }
    closeModal('payOverlay');
    doDownload(pendingPayId);
  } catch(err){
    if(err.message === 'INSUFFICIENT'){
      toast(LANG==='fr'?'❌ Solde AyiPay insuffisant pour cet achat':'❌ Balans AyiPay ou pa ase pou acha sa a');
    } else if(err.message === 'NO_WALLET'){
      toast(LANG==='fr'?'Compte AyiPay non trouvé ou pas encore synchronisé':'Kont AyiPay pa jwenn oswa poko senkwonize');
    } else if(err.code && err.code.startsWith('auth/')){
      toast(LANG==='fr'?'Email ou mot de passe AyiPay incorrect':'Imel oswa mo de pas AyiPay pa kòrèk');
    } else {
      toast((LANG==='fr'?'Erreur: ':'Erè: ')+(err.message||err));
    }
  } finally {
    btn.disabled = false; btn.textContent = oldTxt;
  }
}

  } else if(section==='config'){
    const uid = auth.currentUser ? auth.currentUser.uid : null;
    body.innerHTML = `<label>${t('changePassLbl')}</label><input id="newPassInput" placeholder="****">
      <button class="btn btn-primary" onclick="changeAdminPass()">${t('changePassBtn')}</button>
      <label style="margin-top:20px;">${t('yourUidLbl')}</label>
      ${uid ? `<input value="${uid}" readonly onclick="this.select()">
        <button class="btn btn-secondary" onclick="navigator.clipboard.writeText('${uid}');toast(t('uidCopied'))">${t('copyUidBtn')}</button>`
        : `<p class="empty-note">${t('notLoggedInNote')}</p>`}`;
  }
}
function requireAuthOrPrompt(){
  if(auth.currentUser) return true;
  toast(t('mustLoginToEdit'));
  closeAdminPanel();
  profileMode='login'; renderProfileOverlay(); openModal('profileOverlay');
  return false;
}
function savePromo(){
  if(!requireAuthOrPrompt()) return;
  const promoText = document.getElementById('promoInput').value || settings.promoText;
  const announceText = document.getElementById('announceInput').value || settings.announceText;
  db.collection('settings').doc('global').set({promoText, announceText}, {merge:true})
    .then(function(){ toast(t('promoSaved')); })
    .catch(function(err){ toast('Firestore: '+err.message); });
}
function savePayments(){
  if(!requireAuthOrPrompt()) return;
  const pay = {
    moncash: document.getElementById('pay_moncash').value.trim(),
    natcash: document.getElementById('pay_natcash').value.trim(),
    ayipay: document.getElementById('pay_ayipay').value.trim(),
    paypal: document.getElementById('pay_paypal').value.trim()
  };
  db.collection('settings').doc('global').set({pay}, {merge:true})
    .then(function(){ toast(t('paySaved')); })
    .catch(function(err){ toast('Firestore: '+err.message); });
}
function changeAdminPass(){
  const np = document.getElementById('newPassInput').value.trim();
  if(np.length<4){ toast(t('passTooShort')); return; }
  if(!auth.currentUser){ toast(t('passTooShort')); return; }
  auth.currentUser.updatePassword(np)
    .then(function(){ toast(t('passChanged')); })
    .catch(function(err){ toast(err.message); });
}

/* ================= APK EDIT ================= */
function togglePriceField(){
  const isFree = document.getElementById('f_pricetype').value==='free';
  document.getElementById('f_price').disabled = isFree;
  if(isFree) document.getElementById('f_price').value='';
}
function openApkEdit(id){
  document.getElementById('apkEditTitle').textContent = id ? t('editApkTitle') : t('addApkTitle');
  document.getElementById('f_id').value = id || '';
  const a = id ? apks.find(x=>x.id===id) : null;
  document.getElementById('f_name').value = a? a.name:'';
  document.getElementById('f_cat').value = a? a.cat:'jwet';
  document.getElementById('f_desc').value = a? a.desc:'';
  document.getElementById('f_rating').value = a? a.rating:4.5;
  document.getElementById('f_pricetype').value = a && a.price>0 ? 'paid':'free';
  document.getElementById('f_price').value = a && a.price>0 ? a.price:'';
  document.getElementById('f_price').disabled = !(a && a.price>0);
  document.getElementById('f_icon').value='';
  document.getElementById('f_apk').value = a? (a.apkData||''):'';
  document.getElementById('f_size').value = a? (a.size||''):'';
  document.getElementById('f_version').value = a? (a.version||''):'';
  document.getElementById('f_pkg').value = a? (a.pkg||''):'';
  window._editIcon = a? a.icon:'';
  openModal('apkEditOverlay');
}
function saveApk(){
  if(!requireAuthOrPrompt()) return;
  const id = document.getElementById('f_id').value || db.collection('apks').doc().id;
  const name = document.getElementById('f_name').value.trim();
  if(!name){ toast(t('enterName')); return; }
  const cat = document.getElementById('f_cat').value;
  const desc = document.getElementById('f_desc').value.trim();
  const rating = parseFloat(document.getElementById('f_rating').value)||0;
  const pricetype = document.getElementById('f_pricetype').value;
  const price = pricetype==='paid' ? (parseFloat(document.getElementById('f_price').value)||0) : 0;
  const iconFile = document.getElementById('f_icon').files[0];
  const apkLink = document.getElementById('f_apk').value.trim();
  const size = document.getElementById('f_size').value.trim();
  const version = document.getElementById('f_version').value.trim();
  const pkg = document.getElementById('f_pkg').value.trim();
  function finish(iconData){
    const existing = apks.find(x=>x.id===id);
    const entry = {name, cat, desc, rating, price, size, version, pkg,
      icon: iconData!==undefined ? iconData : (window._editIcon||''),
      apkData: apkLink,
      downloads: existing ? (existing.downloads||0) : 0};
    db.collection('apks').doc(id).set(entry)
      .then(function(){
        closeModal('apkEditOverlay');
        showAdminSection('manage');
        toast(t('apkSaved'));
      })
      .catch(function(err){ toast('Firestore: '+err.message); });
  }
  if(iconFile){ resizeImageToDataURL(iconFile, 200, 0.7, finish); }
  else { finish(undefined); }
}
function deleteApk(id){
  if(!requireAuthOrPrompt()) return;
  if(!confirm(t('confirmDelete'))) return;
  db.collection('apks').doc(id).delete()
    .then(function(){ showAdminSection('manage'); toast(t('apkDeleted')); })
    .catch(function(err){ toast('Firestore: '+err.message); });
}

/* ================= INIT ================= */
applyLang();
renderAll();
updateHeaderProfileIcon();
</script>
